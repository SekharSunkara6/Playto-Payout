version: '3.9'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: playto
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python seed.py &&
             python manage.py runserver 0.0.0.0:8000"
    volumes: [./backend:/app]
    ports: ["8000:8000"]
    depends_on: [db, redis]
    env_file: [./backend/.env]

  celery:
    build: ./backend
    command: celery -A config worker -l info
    volumes: [./backend:/app]
    depends_on: [db, redis]
    env_file: [./backend/.env]

  celery-beat:
    build: ./backend
    command: celery -A config beat -l info
    volumes: [./backend:/app]
    depends_on: [db, redis]
    env_file: [./backend/.env]

  frontend:
    build: ./frontend
    ports: ["5173:80"]
    depends_on: [backend]

volumes:
  pgdata: